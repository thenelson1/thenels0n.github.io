<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/main.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@200;300;400;700&display=swap" rel="stylesheet">
    <title>Todo App</title>
</head>

<body>

    <header>
        <div class="container">
            <button class="first--semi--circle"></button>
            <button class="second--semi--circle"></button>

            <h4>9:41</h4>
            <div class="right--header">
                <img class="header--signal" src="images/signal-solid.svg" alt="">
                <img src="images/wifi-solid.svg" alt="">
                <img src="images/battery-full-solid.svg" alt="">
                
            </div>
        </div>
    </header>

    <section class="hero">
        <div class="container">
            <h1>Welcome Onboard!</h1>
            <h5>Let's help you meet up your tasks</h5>
        </div>
    </section>

    <section class="form">
        <div class="container">
            <div class="form--input">
                <form action="profile.html">
                    <input type="text" placeholder="Enter your full name">
                    <input type="email" placeholder="Enter your email">
                    <input type="password" placeholder="Enter your password">
                    <input type="password" placeholder="Confirm password">

                    <button class="register--button">Register</button>
                </form>
                <p>Already have an account? <a href="login.html">Signed In</a></p> 
            </div>
        </div>
    </section>
</body>
</html>
