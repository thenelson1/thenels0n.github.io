<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/profile.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@200;300;400;700&display=swap" rel="stylesheet">
    <title>Task Page</title>
</head>
<body>
    <header>
        <div class="container">
            <button class="first--semi--circle"></button>
            <button class="second--semi--circle"></button>

            <h4>9:41</h4>
            <div class="right--header">
                <img class="header--img" src="images/signal-solid.svg" alt="">
                <img class="header--img" src="images/wifi-solid.svg" alt="">
                <img class="header--img" src="images/battery-full-solid.svg" alt="">
            </div>
        </div>
        <div class="profile-img-container">
            <img class="profile-img" src="images/my.jpg" alt="">
            <h3>Welcome, Olivia Grace</h3>
        </div>
    </header>

    <section class="hero">
        <div class="container">
            <h5>Good morning!</h5>
            <div class="smart--watch">
                <img src="images/smartwatch.svg" alt="">
            </div>
        </div>
    </section>

    <section class="task">
        <div class="container">
            <h5>Task Lists</h5>
            <div class="task--container">
                <div class="task--header">
                    <h5>To do</h5>
                    <h5 class="task--plus">+</h5>
                </div>

                <div class="task--list">
                    <label class="">
                        <input type="checkbox" checked>Cook rice and chicken at 10pm
                      </label>
                      <label class="">
                        <input type="checkbox" >Learn HTML/CSS by 12pm
                      </label>
                      <label class="">
                        <input type="checkbox">Have lunch by 1:30pm
                      </label>
                      <label class="">
                        <input type="checkbox">Call family and friends by 3pm
                      </label>
                      <label class="">
                        <input type="checkbox">Have dinner by 6pm
                      </label>
                </div>
            </div>
        </div>
    </section> 
</body>
</html>
